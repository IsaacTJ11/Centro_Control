{% extends "base.html" %}

{% block title %}Centro de Control - Costo Marginal{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/coes.css') }}">
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/coes.js') }}"></script>
{% endblock %}


{% block content %}

<div class="page-title">
    <i class="fas fa-chart-line"></i>
    Costo Marginal
</div>

<div class="two-column">
    <div class="status-card">
        <div class="card-header">
            <i class="fas fa-tachometer-alt"></i>
            <!-- Valores Actuales <span id="hora-actuales-cmg"></span> -->
        </div>
        <div class="card-body" id="cmg-valores-actuales">
            <!-- Pendiente de implementación -->
        </div>
    </div>

    <div class="status-card">
        <div class="card-header">
            <i class="fas fa-chart-area"></i>
            CMg Santa Rosa
        </div>
        <div class="card-body">
            <div id="chart-cmg-santa-rosa"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

{% endblock %}
